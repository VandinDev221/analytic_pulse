# Render Blueprint — deploy completo em produção
# https://render.com/docs/blueprint-spec
#
# Após o deploy:
# 1. Abra o Postgres no dashboard Render → Connect → copie a URL interna
# 2. Execute database/schema.sql no SQL shell do banco
# 3. Acesse https://analytic-pulse-web.onrender.com

databases:
  - name: analytic-pulse-db
    plan: free
    databaseName: analytic_pulse
    user: analytic_pulse

services:
  # ── API Express ─────────────────────────────────────────────────────────────
  - type: web
    name: analytic-pulse-api
    runtime: node
    plan: free
    region: oregon
    rootDir: backend
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: analytic-pulse-db
          property: connectionString
      - key: POSTGRES_URL
        fromDatabase:
          name: analytic-pulse-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CRON_SECRET
        generateValue: true
      - key: FRONTEND_URL
        fromService:
          type: web
          name: analytic-pulse-web
          envVarKey: RENDER_EXTERNAL_URL

  # ── Frontend SPA (proxy /api → backend) ─────────────────────────────────────
  - type: web
    name: analytic-pulse-web
    runtime: static
    plan: free
    region: oregon
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /api/*
        destination: https://analytic-pulse-api.onrender.com/api/*
      - type: rewrite
        source: /*
        destination: /index.html

  # ── Cron: pings a cada minuto ────────────────────────────────────────────────
  - type: cron
    name: analytic-pulse-cron
    runtime: node
    plan: free
    region: oregon
    rootDir: backend
    schedule: "* * * * *"
    buildCommand: npm ci
    startCommand: node scripts/trigger-cron.mjs
    envVars:
      - key: CRON_SECRET
        fromService:
          type: web
          name: analytic-pulse-api
          envVarKey: CRON_SECRET
      - key: API_URL
        fromService:
          type: web
          name: analytic-pulse-api
          envVarKey: RENDER_EXTERNAL_URL
