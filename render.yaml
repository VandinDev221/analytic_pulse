# Render Blueprint — deploy em produção
# https://render.com/docs/blueprint-spec
#
# Após o deploy:
# 1. Execute database/schema.sql no Postgres (analytic-pulse-db → PSQL)
# 2. Configure pings em https://cron-job.org (ver README)
# 3. Acesse https://analytic-pulse-web.onrender.com

databases:
  - name: analytic-pulse-db
    plan: free
    databaseName: analytic_pulse
    user: analytic_pulse

services:
  # ── API Express ─────────────────────────────────────────────────────────────
  - type: web
    name: analytic-pulse-api
    runtime: node
    plan: free
    region: oregon
    rootDir: backend
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: analytic-pulse-db
          property: connectionString
      - key: POSTGRES_URL
        fromDatabase:
          name: analytic-pulse-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CRON_SECRET
        generateValue: true
      - key: FRONTEND_URL
        fromService:
          type: web
          name: analytic-pulse-web
          envVarKey: RENDER_EXTERNAL_URL

  # ── Frontend SPA ────────────────────────────────────────────────────────────
  # Static sites no Render não fazem proxy de POST — chamamos a API diretamente.
  - type: web
    name: analytic-pulse-web
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: analytic-pulse-api
          envVarKey: RENDER_EXTERNAL_URL
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  # Pings automáticos: use cron-job.org (grátis) — ver README.
  # Render Cron não tem plano free (mín. ~$1/mês).
