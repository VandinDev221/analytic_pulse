# Render Blueprint — API + Frontend
# https://render.com/docs/blueprint-spec
#
# Postgres NÃO é criado aqui (limite: 1 banco free por workspace no Render).
# No sync, informe DATABASE_URL do Postgres existente ou use Neon (grátis).
#
# Após o deploy:
# 1. Execute database/schema.sql no seu Postgres
# 2. Configure pings em https://cron-job.org (ver README)

services:
  # ── API Express ─────────────────────────────────────────────────────────────
  - type: web
    name: analytic-pulse-api
    runtime: node
    plan: free
    region: oregon
    rootDir: backend
    buildCommand: npm ci --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: POSTGRES_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CRON_SECRET
        generateValue: true
      - key: FRONTEND_URL
        fromService:
          type: web
          name: analytic-pulse-web
          envVarKey: RENDER_EXTERNAL_URL

  # ── Frontend SPA ────────────────────────────────────────────────────────────
  - type: web
    name: analytic-pulse-web
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && VITE_API_URL=https://analytic-pulse-api.onrender.com npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: analytic-pulse-api
          envVarKey: RENDER_EXTERNAL_URL
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
