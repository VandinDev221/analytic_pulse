# Render Blueprint — API + Frontend (monorepo)
# https://render.com/docs/blueprint-spec
#
# Postgres NÃO é criado aqui (limite: 1 banco free por workspace no Render).
# No sync, informe DATABASE_URL do Postgres existente ou use Neon (grátis).
#
# Após o deploy:
# 1. Execute database/schema.sql no seu Postgres
# 2. Configure pings em https://cron-job.org (ver README)

services:
  # ── API Express ─────────────────────────────────────────────────────────────
  - type: web
    name: analytic-pulse-api
    runtime: node
    plan: free
    region: oregon
    rootDir: .
    buildCommand: npm ci --include=dev && npm run build:api
    startCommand: npm run start -w @analytic-pulse/api
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: POSTGRES_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CRON_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        value: https://analytic-pulse.vercel.app,https://analytic-pulse-web.onrender.com
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: API_PUBLIC_URL
        value: https://analytic-pulse-api.onrender.com
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false

  # ── Frontend SPA ────────────────────────────────────────────────────────────
  - type: web
    name: analytic-pulse-web
    runtime: static
    rootDir: .
    buildCommand: npm ci && VITE_API_URL=https://analytic-pulse-api.onrender.com npm run build:web
    staticPublishPath: apps/web/dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: analytic-pulse-api
          envVarKey: RENDER_EXTERNAL_URL
      - key: VITE_GOOGLE_CLIENT_ID
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
